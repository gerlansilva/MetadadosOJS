<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 240" role="img" aria-labelledby="title desc">
  <title id="title">MetaOJS</title>
  <desc id="desc">Marca da ferramenta MetaOJS, representando três fontes conectadas a um registro científico estruturado.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17B6AE"/>
      <stop offset="1" stop-color="#0E7C86"/>
    </linearGradient>
  </defs>

  <g transform="translate(20 20)">
    <rect x="0" y="0" width="200" height="200" rx="48" fill="#0B1F33"/>
    <path d="M52 61 L100 104 L148 61" fill="none" stroke="#F5B942" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M100 104 L100 151" fill="none" stroke="#F5B942" stroke-width="11" stroke-linecap="round"/>
    <circle cx="52" cy="61" r="18" fill="#17B6AE" stroke="#E8FFFD" stroke-width="6"/>
    <circle cx="148" cy="61" r="18" fill="#17B6AE" stroke="#E8FFFD" stroke-width="6"/>
    <circle cx="100" cy="151" r="18" fill="#F5B942" stroke="#FFF8E5" stroke-width="6"/>
    <rect x="76" y="86" width="48" height="42" rx="8" fill="#FFFFFF"/>
    <path d="M88 99 H112 M88 108 H112 M88 117 H105" stroke="#0B1F33" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g transform="translate(255 0)">
    <text x="0" y="115" font-family="Inter, Arial, sans-serif" font-size="96" font-weight="750" letter-spacing="-4" fill="#0B1F33">Meta</text>
    <text x="224" y="115" font-family="Inter, Arial, sans-serif" font-size="96" font-weight="750" letter-spacing="-4" fill="url(#g)">OJS</text>
    <text x="4" y="165" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="500" letter-spacing="1.2" fill="#4B6176">METADADOS CIENTÍFICOS INTEGRADOS</text>
    <path d="M4 189 H600" stroke="#D7E2EA" stroke-width="3"/>
    <text x="4" y="220" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#64788A">OpenAlex  •  Crossref  •  páginas OJS</text>
  </g>
</svg>
